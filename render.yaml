services:
  - type: web
    name: aims-ktt-pricing
    runtime: python
    plan: free

    buildCommand: >
      pip install -r requirements.txt
    
    startCommand: >
      streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"

    autoDeploy: true